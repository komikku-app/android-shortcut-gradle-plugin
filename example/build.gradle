buildscript {
    apply from: '../gradle/version.gradle'
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
        maven {
            url uri("../${repo_name}")
        }
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.0.2'
        classpath "com.github.zellius:android-shortcut-gradle-plugin:${plugin_version}"
    }
}
